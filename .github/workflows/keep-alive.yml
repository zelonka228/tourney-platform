name: Keep Render backend awake

# Render's free web-service plan spins a service down after ~15 minutes
# without traffic, and the first request after that takes 30-60s to wake
# it back up — from a visitor's perspective that looks like the backend
# "crashed". Pinging the health check often enough that it never sits idle
# for 15 minutes avoids the spin-down entirely, at zero cost (this repo is
# public, so GitHub Actions minutes here are unlimited).
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health check
        run: curl -fsS --max-time 60 https://tourneyforge-backend.onrender.com/api/health
